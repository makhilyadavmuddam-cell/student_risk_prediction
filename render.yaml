services:
  - type: web
    name: student-risk-platform
    runtime: python
    buildCommand: pip install -r requirements.txt && python backend/data/generate_data.py && python backend/model/train.py
    startCommand: cd backend && python -m uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
